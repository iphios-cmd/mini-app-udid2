<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UDID Device</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --black: #0a0a0a;
            --black-light: #1a1a1a;
            --black-soft: #2a2a2a;
            --turquoise: #39d6d1;
            --turquoise-light: #5ee4df;
            --turquoise-dark: #2ab3af;
            --turquoise-glow: rgba(57, 214, 209, 0.3);
            --text: #ffffff;
            --text-secondary: #a0a0a0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: linear-gradient(180deg, var(--black) 0%, var(--black-light) 50%, var(--black-soft) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 360px;
            background: var(--black-light);
            border-radius: 28px;
            padding: 48px 32px;
            box-shadow: 
                0 4px 6px -1px rgba(57, 214, 209, 0.1),
                0 20px 40px -10px rgba(57, 214, 209, 0.15),
                0 0 0 1px rgba(57, 214, 209, 0.1),
                0 0 40px rgba(57, 214, 209, 0.05);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--turquoise-dark), var(--turquoise), var(--turquoise-light));
        }

        .glow {
            position: absolute;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, var(--turquoise-glow) 0%, transparent 70%);
            border-radius: 50%;
            top: -100px;
            right: -100px;
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        .icon-wrap {
            width: 88px;
            height: 88px;
            background: linear-gradient(135deg, var(--turquoise) 0%, var(--turquoise-dark) 100%);
            border-radius: 24px;
            margin: 0 auto 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 10px 30px var(--turquoise-glow),
                0 0 0 8px rgba(57, 214, 209, 0.1);
            position: relative;
            z-index: 1;
        }

        .icon-wrap svg {
            width: 44px;
            height: 44px;
            fill: none;
            stroke: var(--black);
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            color: var(--text);
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .desc {
            font-size: 15px;
            color: var(--text-secondary);
            text-align: center;
            line-height: 1.5;
            margin-bottom: 32px;
        }

        .btn-primary {
            width: 100%;
            padding: 18px 28px;
            background: linear-gradient(135deg, var(--turquoise) 0%, var(--turquoise-dark) 100%);
            color: var(--black);
            border: none;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 
                0 4px 12px var(--turquoise-glow),
                0 0 20px rgba(57, 214, 209, 0.2);
            transition: all 0.3s ease;
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .btn-primary:active {
            transform: scale(0.96);
            box-shadow: 0 2px 8px var(--turquoise-glow);
        }

        .btn-primary svg {
            width: 22px;
            height: 22px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .ripple {
            position: absolute;
            background: rgba(10, 10, 10, 0.3);
            border-radius: 50%;
            transform: scale(0);
            animation: ripple 0.6s ease-out;
            pointer-events: none;
        }

        @keyframes ripple {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        .hint-box {
            margin-top: 24px;
            padding: 16px;
            background: var(--black-soft);
            border-radius: 14px;
            border: 1px solid rgba(57, 214, 209, 0.2);
        }

        .hint-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--turquoise);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: monospace;
        }

        .hint-title::before {
            content: '>';
            color: var(--turquoise);
            font-weight: 700;
        }

        .step {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.4;
            font-family: monospace;
        }

        .step:last-child {
            margin-bottom: 0;
        }

        .step-num {
            width: 20px;
            height: 20px;
            background: var(--turquoise);
            color: var(--black);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            flex-shrink: 0;
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glow"></div>
        
        <div class="icon-wrap">
            <svg viewBox="0 0 24 24">
                <rect x="5" y="2" width="14" height="20" rx="2"/>
                <circle cx="12" cy="18" r="1.5"/>
            </svg>
        </div>

        <h1>UDID Устройства</h1>
        <p class="desc">Для передачи UDID, нажмите - <br>"Передать UDID"</p>

        <a href="#" class="btn-primary" id="actionBtn">
            <svg viewBox="0 0 24 24">
                <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
                <path d="M15 3h6v6"/>
                <path d="M10 14L21 3"/>
            </svg>
            Получить UDID
        </a>

        <div class="hint-box">
            <div class="hint-title">
                Как получить UDID
            </div>
            <div class="step">
                <div class="step-num">1</div>
                <div>Нажмите «Получить UDID»</div>
            </div>
            <div class="step">
                <div class="step-num">2</div>
                <div>Далее заходите в Настройки → Загруженный профиль → Установить</div>
            </div>
            <div class="step">
                <div class="step-num">3</div>
                <div>
                    Скопируйте UDID с результатной страницы
                </div>
            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const user = tg.initDataUnsafe.user;
        
        function buildUrl() {
            const baseUrl = 'https://api.ipalinks.ru/get/udid/980386239';
            
            if (user) {
                const userId = user.id;
                const username = user.username || 'no_username';
                return `${baseUrl}/${userId}/${username}.mobileconfig`;
            } else {
                return `${baseUrl}.mobileconfig`;
            }
        }

        const actionBtn = document.getElementById('actionBtn');
        actionBtn.href = buildUrl();

        actionBtn.addEventListener('click', function(e) {
            e.preventDefault();
            const url = buildUrl();
            
            if (tg.openLink) {
                tg.openLink(url);
            } else {
                window.open(url, '_blank');
            }
        });

        actionBtn.addEventListener('click', function(e) {
            const btn = e.currentTarget;
            const rect = btn.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            const x = e.clientX - rect.left - size / 2;
            const y = e.clientY - rect.top - size / 2;
            
            const ripple = document.createElement('span');
            ripple.classList.add('ripple');
            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            btn.appendChild(ripple);
            
            setTimeout(() => ripple.remove(), 600);
        });
    </script>
</body>
</html>
